<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favico.ico" type="image/x-icon">
    <title>csero_copiya · Developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(40, 40, 40, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(60, 60, 60, 0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
            animation: gradientShift 15s ease infinite alternate;
        }

        @keyframes gradientShift {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background-color: #111111;
            padding: 50px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            position: relative;
            backdrop-filter: blur(10px);
            animation: fadeInUp 1s ease-out;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            will-change: transform;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 60px;
            position: relative;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: normal;
            margin: 0 0 15px 0;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff, #a0a0a0);
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
            animation: glitch 5s infinite;
            position: relative;
            display: inline-block;
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; }
            95% { transform: skew(0deg, 0deg); opacity: 1; }
            96% { transform: skew(5deg, 1deg) scale(1.01); opacity: 0.8; }
            97% { transform: skew(-5deg, -1deg) scale(0.99); opacity: 0.9; }
            98% { transform: skew(0deg, 0deg); opacity: 1; }
        }

        .header .title {
            font-size: 1.6rem;
            color: #888;
            margin: 10 0 25px 0;
            animation: slideInRight 1s ease-out 0.3s both;
            border-left: 4px solid #3a3a3a;
            padding-left: 20px;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .header .love {
            font-size: 1.3rem;
            margin-top: 30px;
            padding-bottom: 25px;
            border-bottom: 2px solid #2a2a2a;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header .love span {
            background-color: #1a1a1a;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 1.1rem;
            border: 1px solid #3a3a3a;
            display: inline-block;
            transition: all 0.3s ease;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 0 20px 0 rgba(255, 255, 255, 0.2); }
        }

        .header .love span:hover {
            background-color: #2a2a2a;
            border-color: #666;
            transform: scale(1.02);
        }

        .skills-section {
            margin-top: 60px;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .section-title {
            font-size: 2rem;
            font-weight: normal;
            margin: 0 0 30px 0;
            text-transform: lowercase;
            border-left: 6px solid #666;
            padding-left: 20px;
            letter-spacing: -1px;
            position: relative;
            overflow: hidden;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, #666, transparent);
            animation: lineGrow 2s infinite;
        }

        @keyframes lineGrow {
            0% { width: 50px; opacity: 0.5; }
            50% { width: 150px; opacity: 1; }
            100% { width: 50px; opacity: 0.5; }
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px 10px;
            list-style: none;
            padding: 0;
            margin: 0 0 60px 0;
        }

        .skill-item {
            font-size: 1.1rem;
            padding: 10px 5px;
            border-bottom: 1px dotted #333;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            color: #bbb;
            transition: all 0.3s ease;
            animation: fadeInScale 0.5s ease-out forwards;
            opacity: 0;
            transform: scale(0.9);
            animation-fill-mode: forwards;
        }

        .skill-item:nth-child(1) { animation-delay: 0.1s; }
        .skill-item:nth-child(2) { animation-delay: 0.15s; }
        .skill-item:nth-child(3) { animation-delay: 0.2s; }
        .skill-item:nth-child(4) { animation-delay: 0.25s; }
        .skill-item:nth-child(5) { animation-delay: 0.3s; }
        .skill-item:nth-child(6) { animation-delay: 0.35s; }
        .skill-item:nth-child(7) { animation-delay: 0.4s; }
        .skill-item:nth-child(8) { animation-delay: 0.45s; }
        .skill-item:nth-child(9) { animation-delay: 0.5s; }
        .skill-item:nth-child(10) { animation-delay: 0.55s; }
        .skill-item:nth-child(11) { animation-delay: 0.6s; }
        .skill-item:nth-child(12) { animation-delay: 0.65s; }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .skill-item:hover {
            color: #fff;
            border-bottom-color: #666;
            transform: translateY(-2px) scale(1.05);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        .tech-section {
            background: linear-gradient(145deg, #0f0f0f, #151515);
            padding: 40px 30px;
            margin: 40px -30px -30px -30px;
            border: 1px solid #2a2a2a;
            border-left: none;
            border-right: none;
            position: relative;
            overflow: hidden;
        }

        .tech-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.02), transparent);
            animation: shimmer 8s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .about-block {
            margin-top: 50px;
            font-size: 1.1rem;
            color: #aaa;
            border-left: 3px solid #444;
            padding: 20px 0 20px 30px;
            position: relative;
            animation: slideInLeft 1s ease-out 0.5s both;
            background: linear-gradient(90deg, rgba(255,255,255,0.02), transparent);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .about-block::before {
            content: '✦';
            position: absolute;
            left: 5px;
            top: 20px;
            color: #666;
            font-size: 1.5rem;
            animation: rotate 4s infinite linear;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 70px;
            text-align: right;
            font-size: 1rem;
            color: #666;
            border-top: 1px solid #2a2a2a;
            padding-top: 30px;
            animation: fadeIn 1s ease-out 0.8s both;
        }

        .footer a {
            color: #888;
            text-decoration: none;
            border-bottom: 1px dotted #444;
            transition: all 0.3s ease;
            position: relative;
            padding: 0 5px;
        }

        .footer a:hover {
            color: #fff;
            border-bottom-color: #888;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        .footer a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #888;
            transition: width 0.3s ease;
        }

        .footer a:hover::after {
            width: 100%;
        }

        @media (max-width: 900px) {
            .skills-grid { grid-template-columns: repeat(4, 1fr); }
            .container { padding: 30px; }
            .header h1 { font-size: 2.8rem; }
        }

        @media (max-width: 600px) {
            .skills-grid { grid-template-columns: repeat(3, 1fr); }
            .container { padding: 20px; }
            .header h1 { font-size: 2.2rem; }
            .tech-section { margin: 30px -20px -20px -20px; padding: 30px 20px; }
        }
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-100vh) rotate(360deg); }
        }
    </style>
</head>

    <script>
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                
                particle.style.opacity = Math.random() * 0.3;
                
                particlesContainer.appendChild(particle);
            }
        }

        window.addEventListener('load', createParticles);

        const container = document.getElementById('container');
        
        document.addEventListener('mousemove', (e) => {
            const mouseX = (e.clientX / window.innerWidth - 0.5) * 2; // от -1 до 1
            const mouseY = (e.clientY / window.innerHeight - 0.5) * 2; // от -1 до 1
            
            const rotateY = mouseX * 8; 
            const rotateX = -mouseY * 8; 
            
            container.style.transform = `perspective(2000px) rotateY(${rotateY}deg) rotateX(${rotateX}deg) translateZ(20px)`;
        });

        document.addEventListener('mouseleave', () => {
            container.style.transform = 'perspective(2000px) rotateY(0deg) rotateX(0deg) translateZ(0)';
        });

        container.addEventListener('mouseenter', () => {
            container.style.transition = 'transform 0.1s ease-out, box-shadow 0.3s ease';
            container.style.boxShadow = '0 30px 60px rgba(0, 255, 255, 0.2), 0 0 0 1px rgba(0, 255, 255, 0.1) inset';
        });

        container.addEventListener('mouseleave', () => {
            container.style.boxShadow = '0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.02) inset';
        });

        setTimeout(() => {
            container.style.animation = 'none';
        }, 1000);
    </script>
